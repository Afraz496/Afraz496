name: Metrics

on:
  # Regenerate once a day
  schedule:
    - cron: "0 8 * * *"
  # Let you trigger it manually from the Actions tab
  workflow_dispatch:
  # Regenerate when you push to main
  push:
    branches: ["main"]

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          # Personal access token you create (see setup notes)
          token: ${{ secrets.METRICS_TOKEN }}

          # Your GitHub username
          user: Afraz496

          # Output file that gets committed into your repo
          filename: github-metrics.svg

          # Overall look
          template: classic
          base: header, activity, community, repositories
          config_timezone: America/Vancouver

          # Most-used languages breakdown (replaces the old top-langs card)
          plugin_languages: yes
          plugin_languages_details: bytes-size, percentage
          plugin_languages_limit: 8
